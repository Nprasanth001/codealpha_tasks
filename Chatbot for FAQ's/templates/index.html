<!DOCTYPE html>
<html>
<head>
    <title>FAQ Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="chat-container">

    <h1>🤖 FAQ Chatbot</h1>

    <div id="chatBox"></div>

    <div class="input-box">

        <input
            type="text"
            id="userInput"
            placeholder="Ask a question...">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
